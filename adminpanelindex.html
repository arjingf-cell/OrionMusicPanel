    <style>
        /* 1. CANLI VE DERİN MOR ARKA PLAN */
        body {
            background: radial-gradient(circle at 0% 0%, #2e0b4e 0%, #050505 60%),
                radial-gradient(circle at 100% 100%, #1a0533 0%, #050505 60%);
            background-color: #050505;
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            margin: 0;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        /* 2. NEON SIDEBAR */
        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            padding: 24px;
            z-index: 10;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(139, 92, 246, 0.3);
            display: flex;
            flex-direction: column;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: #71717a;
            border-radius: 12px;
            margin-bottom: 4px;
            transition: 0.2s;
            cursor: pointer;
        }

        .nav-item.active {
            background: rgba(139, 92, 246, 0.1);
            color: #a78bfa;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.1);
        }

        /* 3. NEON KARTLAR VE PANELLER */
        .stat-card,
        .xl\:col-span-2 {
            background: rgba(15, 15, 15, 0.6) !important;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(139, 92, 246, 0.2) !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(139, 92, 246, 0.05);
            border-radius: 20px;
        }

        .chart-svg {
            width: 100%;
            height: 40px;
            /* Boyutu biraz küçülterek sadece alt şeritte kalmasını sağladım */
            position: absolute;
            bottom: 0;
            left: 0;
            opacity: 0.5;
            pointer-events: none;
            /* Altındaki butonlara tıklanmasını engellemez */
            z-index: 1;
        }

        .op-card {
            background: rgba(13, 13, 13, 0.5);
            border: 1px solid rgba(139, 92, 246, 0.1);
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .op-card:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            transform: translateY(-2px);
        }

        .logo-glow {
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.6);
            border-radius: 12px;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }

        .pulse-red {
            animation: pulse 2s infinite;
        }

        .main-content {
            margin-left: 280px;
            padding: 40px;
            width: calc(100% - 280px);
        }

        /* Chat Custom Scrollbar */
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .chat-scroll::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>

        const CopyButton = ({ value }) => {
            const [copied, setCopied] = React.useState(false);
            const copyValue = async (event) => {
                event.stopPropagation();
                const text = value === null || value === undefined || value === '' ? '-' : String(value);
                try {
                    await navigator.clipboard.writeText(text);
                } catch (err) {
                    const area = document.createElement('textarea');
                    area.value = text;
                    document.body.appendChild(area);
                    area.select();
                    document.execCommand('copy');
                    area.remove();
                }
                setCopied(true);
                setTimeout(() => setCopied(false), 1000);
            };

            return (
                <button
                    type="button"
                    onClick={copyValue}
                    className="w-8 h-8 rounded-lg bg-zinc-800 hover:bg-purple-600 text-zinc-300 hover:text-white transition-all shrink-0"

                    console.error('Destek mesaji gonderilemedi:', messageError);

                    loadSupportTicketsFromSupabase();

                    .from('support_tickets')
                    .update({ status: 'open', updated_at: new Date().toISOString() })
                    .eq('id', selectedMessageTicket.id);

                    console.error('Ticket guncellenemedi:', ticketError);

                addActivity(`Ticket #${id} onceligi ${priorityMeta[priority].label} yapildi`, 'support');

                const { error } = await supabaseClient
                    .from('support_tickets')
                    .update({ priority, updated_at: new Date().toISOString() })
                    .eq('id', id);

                if (error) {
                    console.error('Ticket onceligi guncellenemedi:', error);
                    alert(`Öncelik güncellenemedi: ${error.message}`);
                    loadSupportTicketsFromSupabase();
                }
            };

            const addTicketNote = async () => {
                if (!selectedTicket || !ticketNoteText.trim()) return;
                const note = {
                    id: Date.now(),
                    author: 'Arjin',
                    text: ticketNoteText.trim(),
                    time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })

                const updatedTicket = { ...selectedTicket, notes: [...(selectedTicket.notes || []), note] };
                setSelectedTicket(updatedTicket);
                setTickets(tickets.map(t => t.id === selectedTicket.id ? updatedTicket : t));
                setTicketNoteText('');
                addActivity(`Ticket #${selectedTicket.id} ic not eklendi`, 'support');

                const { error } = await supabaseClient
                    .from('support_tickets')
                    .update({ internal_notes: updatedTicket.notes, updated_at: new Date().toISOString() })
                    .eq('id', selectedTicket.id);

                if (error) {

                    loadSupportTicketsFromSupabase();
                }

                    role: 'Operasyon',

                    time: new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' }),

                setAdminMessageText('');

            const ticketsPerPage = 10;
            const filteredTickets = tickets.filter(t => {
                return !ticketFilterDate || t.date === ticketFilterDate;

            const totalTicketPages = Math.max(1, Math.ceil(filteredTickets.length / ticketsPerPage));
            const currentTickets = filteredTickets.slice((ticketCurrentPage - 1) * ticketsPerPage, ticketCurrentPage * ticketsPerPage);
            const selectedTicketProfile = selectedTicket ? getTicketProfile(selectedTicket) : null;
            const selectedTicketMessages = selectedTicket ? (selectedTicket.messages || []) : [];
            const supportInboxTickets = React.useMemo(() => {
                return [...tickets].sort((a, b) => {
                    const aMessages = a.messages || [];
                    const bMessages = b.messages || [];
                    const lastA = aMessages.length ? aMessages[aMessages.length - 1].createdAt : (a.raw?.updated_at || a.date);
                    const lastB = bMessages.length ? bMessages[bMessages.length - 1].createdAt : (b.raw?.updated_at || b.date);
                    return String(lastB).localeCompare(String(lastA));
                });
            }, [tickets]);
            const selectedMessageTicketMessages = selectedMessageTicket ? (selectedMessageTicket.messages || []) : [];
            const oacStats = {
                pending: oacRequests.filter(req => req.status === 'pending').length,

                { id: 2, icon: 'fas fa-compact-disc', title: 'Yayin onayi', text: `${releases.filter(r => r.status === 'pending').length} yayin incelemede`, color: 'text-amber-400' },
                { id: 3, icon: 'fas fa-wallet', title: 'Odeme kontrolu', text: '2 odeme talebi sirada', color: 'text-purple-400' }
            ];
            const globalSearchResults = globalSearch.trim()
                ? [
                    ...tickets.map(t => ({ type: 'Ticket', title: t.subject, meta: t.artist, action: () => { setActivePage('tickets'); setSelectedTicket(t); } })),
                    ...releases.map(r => ({ type: 'Yayin', title: r.song, meta: r.artist, action: () => { setActivePage('releases'); setViewingRelease(r); } })),
                    ...artists.map(a => ({ type: 'Sanatci', title: a.name, meta: a.email || a.id, action: () => setActivePage('artists') }))
                ].filter(item => `${item.title} ${item.meta}`.toLowerCase().includes(globalSearch.toLowerCase())).slice(0, 6)
                : [];

            const activeArtists = artists.filter(artist => artist.isActiveArtist);
            const newArtistRegistrations = artists.filter(artist => artist.isNewRegistration);
            const filteredArtists = activeArtists.filter(artist => {
                const searchMatch = artist.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                   artist.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                   (artist.email || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                                   (artist.phone || '').toLowerCase().includes(searchTerm.toLowerCase());
                const dateMatch = !filterDate || artist.date === filterDate;
                return searchMatch && dateMatch;
            });

            const handleNext = () => {
                if (startIndex < allData.length - 8) setStartIndex(prev => prev + 1);
            };

                if (startIndex > 0) setStartIndex(prev => prev - 1);

            const checkAdminAccess = async (user) => {
                const { data, error } = await supabaseClient
                    .from('admin_users')
                    .select('email, role, active')
                    .eq('user_id', user.id)
                    .eq('active', true)
                    .maybeSingle();

                if (error) throw error;
                if (!data) throw new Error('Bu hesap admin yetkisine sahip değil.');
                return data;
            };

            const handleAdminLogin = async (loginId, password) => {
                if (!loginId || !password) throw new Error('Kullanıcı adı ve şifre zorunludur.');
                const email = resolveAdminLoginEmail(loginId);
                if (!email.includes('@')) throw new Error('Tanımlı olmayan kullanıcı adı.');

                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });
                if (error) {
                    console.error('Supabase admin auth hatası:', error);
                    throw new Error(`Kullanıcı adı veya şifre hatalı. (${error.message})`);
                }

                const admin = await checkAdminAccess(data.user);
                setCurrentAdmin(admin);
                setIsLoggedIn(true);
            };

            const handleAdminLogout = async () => {
                await supabaseClient.auth.signOut();
                setCurrentAdmin(null);
                setIsLoggedIn(false);
            };

            React.useEffect(() => {
                let mounted = true;

                const restoreSession = async () => {
                    const { data } = await supabaseClient.auth.getSession();
                    const user = data.session?.user;

                    if (!user) {
                        if (mounted) setAuthChecking(false);
                        return;
                    }

                    try {
                        const admin = await checkAdminAccess(user);
                        if (mounted) {
                            setCurrentAdmin(admin);
                            setIsLoggedIn(true);
                        }
                    } catch (err) {
                        await supabaseClient.auth.signOut();
                        if (mounted) {
                            setCurrentAdmin(null);
                            setIsLoggedIn(false);
                        }
                    } finally {
                        if (mounted) setAuthChecking(false);
                    }
                };

                restoreSession();

                const { data: authListener } = supabaseClient.auth.onAuthStateChange((event) => {
                    if (event === 'SIGNED_OUT') {
                        setCurrentAdmin(null);
                        setIsLoggedIn(false);
                    }
                });

                return () => {
                    mounted = false;
                    authListener.subscription.unsubscribe();

                                            </div>
                                        )}

                                        {settingsTab === 'roles' && (
                                            <div className="bg-zinc-900/40 border border-zinc-800 rounded-3xl overflow-hidden">
                                                <div className="p-6 border-b border-zinc-800">
                                                    <h3 className="text-lg font-black text-white">Rol ve Yetki Yonetimi</h3>
                                                    <p className="text-xs text-zinc-500 mt-1">Modullere erisim seviyelerini belirle.</p>
                                                </div>
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left">
                                                        <thead className="bg-zinc-900/60 text-[10px] uppercase tracking-widest text-zinc-500">
                                                            <tr>
                                                                <th className="px-6 py-4">Rol</th>
                                                                <th className="px-6 py-4">Destek</th>
                                                                <th className="px-6 py-4">Yayinlar</th>
                                                                <th className="px-6 py-4">Finans</th>
                                                                <th className="px-6 py-4">Ayarlar</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-zinc-800/60">
                                                            {rolePermissions.map((row, i) => (
                                                                <tr key={i} className="hover:bg-purple-500/5 transition-all">
                                                                    <td className="px-6 py-5 text-sm font-bold text-zinc-100">{row.role}</td>
                                                                    {['support', 'releases', 'finance', 'settings'].map((permissionKey) => (
                                                                        <td key={permissionKey} className="px-6 py-5">
                                                                            <button
                                                                                type="button"
                                                                                onClick={() => toggleRolePermission(i, permissionKey)}
                                                                                className={`inline-flex w-10 h-6 rounded-full p-0.5 transition-all ${row[permissionKey] ? 'bg-purple-600' : 'bg-zinc-800'}`}
                                                                                aria-label={`${row.role} ${permissionKey}`}
                                                                            >
                                                                                <span className={`w-5 h-5 rounded-full bg-white transition-all ${row[permissionKey] ? 'translate-x-4' : ''}`}></span>
                                                                            </button>
                                                                        </td>
                                                                    ))}
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        )}

                                        {settingsTab === 'notifications' && (
                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                                {notificationSettings.map((item) => (
                                                    <div key={item.id} className="bg-zinc-900/40 border border-zinc-800 rounded-3xl p-6 flex items-center justify-between gap-4">
                                                        <div>
                                                            <h3 className="text-sm font-black text-white">{item.title}</h3>
                                                            <p className="text-xs text-zinc-500 mt-1 leading-relaxed">{item.desc}</p>
                                                        </div>
                                                        <button
                                                            type="button"
                                                            onClick={() => toggleNotificationSetting(item.id)}
                                                            className={`w-11 h-6 rounded-full p-0.5 transition-all ${item.enabled ? 'bg-purple-600' : 'bg-zinc-800'}`}
                                                            aria-label={item.title}
                                                        >
                                                            <span className={`block w-5 h-5 rounded-full bg-white transition-all ${item.enabled ? 'translate-x-5' : ''}`}></span>
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        {settingsTab === 'rules' && (
                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                                <div className="bg-zinc-900/40 border border-zinc-800 rounded-3xl p-8">
                                                    <h3 className="text-lg font-black text-white mb-6">Destek Kurallari</h3>
                                                    <div className="space-y-5">
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-2 block">Varsayilan oncelik</label>
                                                            <select defaultValue="normal" className="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-200 outline-none focus:border-purple-500/60">
                                                                <option value="high">Acil</option>
                                                                <option value="normal">Normal</option>
                                                                <option value="low">Dusuk</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-2 block">Otomatik kapanma</label>
                                                            <input defaultValue="7 gun" className="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-200 outline-none focus:border-purple-500/60" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-2 block">Hazir cevap</label>
                                                            <textarea defaultValue="Merhaba, talebinizi aldik. Ekibimiz en kisa surede kontrol edecek." className="w-full min-h-[110px] bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-200 outline-none focus:border-purple-500/60 resize-none" />
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="bg-zinc-900/40 border border-zinc-800 rounded-3xl p-8">
                                                    <h3 className="text-lg font-black text-white mb-6">Yayin ve Finans</h3>
                                                    <div className="space-y-5">
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-2 block">Minimum yayin tarihi</label>
                                                            <input defaultValue="4 gun sonrasi" className="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-200 outline-none focus:border-purple-500/60" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-2 block">Minimum odeme limiti</label>
                                                            <input defaultValue="1000 TL" className="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-200 outline-none focus:border-purple-500/60" />
                                                        </div>
                                                        <div>
                                                            <label className="text-[10px] font-black uppercase tracking-widest text-zinc-600 mb-2 block">Komisyon orani</label>
                                                            <input defaultValue="15%" className="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-200 outline-none focus:border-purple-500/60" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </section>
                                </div>
                            </div>
                        )}

                        {activePage === 'marketing' && (
                            <div className="animate-in slide-in-from-right duration-500 text-center py-20">
                                <div className="w-20 h-20 bg-purple-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-purple-500/20">
                                    <i className="fas fa-magic text-3xl text-purple-500"></i>
                                </div>
                                <h2 className="text-3xl font-black mb-2">Smart Link Oluşturucu</h2>
                                <p className="text-zinc-500 max-w-md mx-auto mb-10">Sanatçıların yayınlarını tüm platformlarda tek bir linkle paylaşabileceği şık sayfalar hazırlayın.</p>

                                <div className="max-w-2xl mx-auto bg-zinc-900/40 p-8 rounded-3xl border border-zinc-800 text-left">
                                    <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2 block">Şarkı ISRC veya Linki</label>
                                    <div className="flex gap-4">
                                        <input type="text" placeholder="https://open.spotify.com/track/..." className="flex-1 bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-purple-500 outline-none" />
                                        <button className="bg-white text-black px-6 py-3 rounded-xl font-bold text-sm hover:bg-zinc-200 transition">Sayfa Oluştur</button>
                                    </div>
                                    <div className="mt-8 grid grid-cols-2 gap-4">
                                        <div className="p-4 border border-zinc-800 rounded-2xl bg-zinc-900/20">
                                            <div className="text-xs font-bold text-purple-400 mb-1">Aktif Sayfalar</div>
                                            <div className="text-2xl font-black">24</div>
                                        </div>
                                        <div className="p-4 border border-zinc-800 rounded-2xl bg-zinc-900/20">
                                            <div className="text-xs font-bold text-blue-400 mb-1">Toplam Tıklanma</div>
                                            <div className="text-2xl font-black">1.2M</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Sanatçı Ekle Modal */}
                        {showModal && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                                <div className="bg-zinc-900 border border-purple-500/30 p-8 rounded-3xl w-full max-w-md shadow-2xl shadow-purple-500/10 animate-in zoom-in duration-200">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-xl font-bold text-white">Yeni Sanatçı Ekle</h3>
                                        <button onClick={() => setShowModal(false)} className="text-zinc-500 hover:text-white transition">
                                            <i className="fas fa-times"></i>
                                        </button>
                                    </div>
                                    <div className="space-y-4 text-left">
                                        <div>
                                            <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 block">İsim</label>
                                            <input
                                                type="text"
                                                className="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-purple-500 outline-none text-white"
                                                placeholder="İsim"
                                                value={formData.name}
                                                onChange={(e) => setFormData({...formData, name: e.target.value})}
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 block">Soyisim</label>
                                            <input
                                                type="text"
                                                className="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-purple-500 outline-none text-white"
                                                placeholder="Soyisim"
                                                value={formData.surname}
                                                onChange={(e) => setFormData({...formData, surname: e.target.value})}
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1 block">E-Posta</label>
                                            <input
                                                type="email"
                                                className="w-full bg-black border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-purple-500 outline-none text-white"
                                                placeholder="sanatci@email.com"
                                                value={formData.email}
                                                onChange={(e) => setFormData({...formData, email: e.target.value})}
                                            />
                                        </div>
                                        <button
                                            className="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-bold text-sm transition mt-4 shadow-lg shadow-purple-500/20 active:scale-95"
                                            onClick={addArtist}
                                        >
                                            Sanatçıyı Kaydet
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
